<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thitiprastudio - Order System</title>
    <style>
        :root { --primary: #ff85a2; --bg: #fdf2f4; --text: #444; }
        body { font-family: 'Kanit', sans-serif; background: var(--bg); margin: 0; padding: 15px; color: var(--text); }
        .container { max-width: 450px; margin: 20px auto; background: white; padding: 25px; border-radius: 24px; box-shadow: 0 10px 30px rgba(255,133,162,0.15); }
        
        /* Profile Header */
        .profile { text-align: center; margin-bottom: 20px; }
        .profile img { width: 100px; height: 100px; border-radius: 50%; border: 4px solid var(--primary); object-fit: cover; }
        h2 { text-align: center; color: var(--primary); margin: 10px 0; font-size: 24px; letter-spacing: 1px; }

        /* Form Styling */
        label { display: block; margin-top: 15px; font-weight: 600; font-size: 14px; color: #666; }
        input, select { width: 100%; padding: 12px; margin-top: 6px; border: 1.5px solid #eee; border-radius: 12px; box-sizing: border-box; outline: none; font-size: 15px; transition: 0.3s; }
        input:focus { border-color: var(--primary); background: #fff9fa; }
        
        .row { display: flex; gap: 10px; }
        .col { flex: 1; }

        /* Button & UI */
        .btn-submit { background: var(--primary); color: white; border: none; padding: 16px; width: 100%; border-radius: 14px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 30px; box-shadow: 0 5px 15px rgba(255,133,162,0.3); transition: 0.3s; }
        .btn-submit:hover { background: #ff6b8d; transform: translateY(-2px); }
        .btn-submit:disabled { background: #ccc; cursor: not-allowed; transform: none; box-shadow: none; }

        #preview { width: 100%; margin-top: 15px; border-radius: 12px; display: none; border: 2px dashed var(--primary); }
        .loader { display: none; text-align: center; color: var(--primary); font-weight: bold; margin-top: 15px; font-size: 14px; }
        
        /* Checkbox Custom */
        .checkbox-row { display: flex; gap: 20px; margin-top: 10px; }
        .checkbox-item { display: flex; align-items: center; gap: 5px; font-size: 14px; }
        .checkbox-item input { width: auto; margin: 0; }
    </style>
</head>
<body>

<div class="container">
    <div class="profile">
        <img src="IMG_5808.jpeg" alt="Thitiprastudio Logo">
        <h2>Thitiprastudio</h2>
    </div>

    <form id="orderForm">
        <label>ช่องทางการสั่งซื้อ</label>
        <select name="channel" id="channel" onchange="updateUI()">
            <option value="direct">สั่งผ่านร้าน (แนบสลิป)</option>
            <option value="line">Line MyShop (ไม่ต้องแนบรูป)</option>
        </select>

        <div class="row">
            <div class="col">
                <label>วันที่แจ้งโอน/สั่งซื้อ</label>
                <input type="date" name="orderDate" id="orderDate" required>
            </div>
            <div class="col">
                <label>เวลา</label>
                <input type="time" name="orderTime" id="orderTime" required>
            </div>
        </div>

        <label>เครือฟอนต์</label>
        <select name="network" id="network" onchange="updateUI()">
            <option value="BR_PRH">เครือ BR & PRH</option>
            <option value="P_Jang">เครือ พี่จ่าง</option>
            <option value="TCS">เครือ TCS</option>
            <option value="KT">เครือ KT</option>
            <option value="TAU">เครือ TAU</option>
            <option value="TP">เครือ TP</option>
            <option value="Novel_EB">เครือ Novel/EB</option>
        </select>

        <label>ชื่อฟอนต์</label>
        <input type="text" name="fontName" placeholder="ระบุชื่อฟอนต์..." required>

        <label>อีเมลลูกค้า</label>
        <input type="email" name="email" placeholder="customer@email.com" required>

        <label>ชนิดการใช้งาน</label>
        <select name="usageType">
            <option>ส่วนตัว</option>
            <option>เชิงพาณิชย์</option>
            <option>ส่วนตัว & เชิงพาณิชย์</option>
            <option>บริษัท</option>
        </select>

        <div class="checkbox-row">
            <div class="checkbox-item"><input type="checkbox" name="shipStatus"> สถานะจัดส่ง</div>
            <div class="checkbox-item"><input type="checkbox" name="certStatus"> ใบรับรอง</div>
        </div>

        <div class="row">
            <div class="col">
                <label>ราคาขาย (บาท)</label>
                <input type="number" name="price" id="price" placeholder="0" required>
            </div>
            <div class="col" id="rateCol">
                <label>เรท (ต้นทุน)</label>
                <input type="number" name="rate" id="rate" value="0">
            </div>
        </div>

        <div id="slipArea">
            <label>แนบสลิปโอนเงิน</label>
            <input type="file" id="slipFile" accept="image/*" onchange="previewImage()">
            <img id="preview">
        </div>

        <div class="loader" id="loader">🚀 กำลังบันทึกข้อมูลลง Sheet...</div>
        <button type="submit" class="btn-submit" id="submitBtn">บันทึกข้อมูลออเดอร์</button>
    </form>
</div>

<script>
    // URL ของ Google Apps Script
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzL5HNhVCzogiMnfLMx0gbb067OdHcvFbH97BjgMSMVVnnlMrS3rdUF-rWbpWygt7xd/exec"; 

    // ตั้งค่าวันที่ปัจจุบัน
    document.getElementById('orderDate').valueAsDate = new Date();

    function updateUI() {
        const network = document.getElementById('network').value;
        const channel = document.getElementById('channel').value;
        
        // จัดการช่องเรท (ซ่อนถ้าเป็น BR_PRH)
        document.getElementById('rateCol').style.visibility = (network === "BR_PRH") ? "hidden" : "visible";
        
        // จัดการช่องแนบสลิป
        document.getElementById('slipArea').style.display = (channel === "line") ? "none" : "block";
    }

    function previewImage() {
        const file = document.getElementById('slipFile').files[0];
        const preview = document.getElementById('preview');
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => { preview.src = e.target.result; preview.style.display = 'block'; };
            reader.readAsDataURL(file);
        }
    }

    document.getElementById('orderForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const loader = document.getElementById('loader');
        
        btn.disabled = true;
        loader.style.display = 'block';

        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData.entries());
        
        // จัดการข้อมูล Checkbox
        data.shipStatus = formData.has('shipStatus') ? "จัดส่งแล้ว" : "-";
        data.certStatus = formData.has('certStatus') ? "มีใบรับรอง" : "-";

        // แปลงรูปภาพเป็น Base64
        const fileInput = document.getElementById('slipFile');
        if (fileInput.files[0] && data.channel !== "line") {
            const reader = new FileReader();
            data.image = await new Promise(resolve => {
                reader.onload = (e) => resolve(e.target.result);
                reader.readAsDataURL(fileInput.files[0]);
            });
        }

        try {
            // ส่งข้อมูลไปยัง Google Apps Script
            await fetch(WEB_APP_URL, {
                method: "POST",
                mode: 'no-cors',
                body: JSON.stringify(data)
            });
            
            alert("✨ บันทึกสำเร็จ! ข้อมูลถูกส่งไปที่ Google Sheet แล้วค่ะ");
            e.target.reset();
            document.getElementById('orderDate').valueAsDate = new Date();
            document.getElementById('preview').style.display = 'none';
            updateUI();
        } catch (error) {
            console.error(error);
            alert("❌ เกิดข้อผิดพลาดในการเชื่อมต่อ โปรดลองอีกครั้ง");
        } finally {
            btn.disabled = false;
            loader.style.display = 'none';
        }
    };

    updateUI(); // รันครั้งแรก
</script>

</body>
</html>
