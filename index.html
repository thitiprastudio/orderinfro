<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thitiprastudio - Order System</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #ff85a2; --bg: #fdf2f4; --text: #444; }
        body { font-family: 'Kanit', sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; color: var(--text); }
        .container { max-width: 480px; margin: auto; padding: 20px; }
        
        /* สลับหน้า Page */
        .page { display: none; }
        .page.active { display: block; }

        .profile { text-align: center; margin-bottom: 20px; }
        .profile img { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--primary); object-fit: cover; }
        
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .font-item { background: #fff9fa; padding: 15px; border-radius: 15px; border: 1px solid #ffe4e9; margin-bottom: 15px; position: relative; }
        
        label { display: block; font-size: 13px; font-weight: bold; color: #666; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1.5px solid #eee; border-radius: 12px; box-sizing: border-box; font-size: 14px; outline: none; }
        input:focus { border-color: var(--primary); }

        /* จัดระเบียบ Checkbox */
        .checkbox-group { display: flex; gap: 20px; margin-top: 10px; }
        .checkbox-item { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px; }
        .checkbox-item input { width: 18px; height: 18px; margin: 0; cursor: pointer; }

        .btn-add { background: white; color: var(--primary); border: 2px dashed var(--primary); padding: 12px; width: 100%; border-radius: 12px; cursor: pointer; font-weight: bold; margin-bottom: 20px; transition: 0.3s; }
        .btn-add:hover { background: var(--primary); color: white; }
        
        .btn-submit { background: var(--primary); color: white; border: none; padding: 16px; width: 100%; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(255,133,162,0.3); }
        .btn-remove { position: absolute; top: 10px; right: 10px; color: #ff4d4d; border: none; background: none; font-size: 20px; cursor: pointer; }
        
        /* Navigation Bar ด้านล่าง */
        .nav-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #eee; z-index: 100; }
        .nav-item { text-align: center; color: #aaa; cursor: pointer; font-size: 12px; transition: 0.3s; }
        .nav-item i { font-size: 20px; margin-bottom: 3px; }
        .nav-item.active { color: var(--primary); }

        #preview { width: 100%; border-radius: 12px; margin-top: 10px; display: none; border: 1px solid #eee; }
        .loader { display: none; text-align: center; color: var(--primary); font-weight: bold; padding: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="home-page" class="page active">
        <div class="profile">
            <img src="IMG_5808.jpeg" alt="Logo">
            <h2 style="color:var(--primary); margin:10px;">Thitiprastudio</h2>
        </div>

        <form id="orderForm">
            <div class="card">
                <div style="display:flex; gap:10px;">
                    <div style="flex:1"><label>วันที่แจ้งโอน</label><input type="date" id="orderDate" required></div>
                    <div style="flex:1"><label>เวลา</label><input type="time" id="orderTime" required></div>
                </div>
                <label>อีเมลลูกค้า</label>
                <input type="email" id="email" placeholder="customer@email.com" required>
            </div>

            <div id="fontList"></div>
            <button type="button" class="btn-add" onclick="addFont()">+ เพิ่มรายการฟอนต์</button>

            <div class="card">
                <label>ช่องทางการสั่งซื้อ</label>
                <select id="channel" onchange="toggleSlip()">
                    <option value="direct">สั่งผ่านร้าน (แนบสลิป)</option>
                    <option value="line">Line MyShop</option>
                </select>

                <div id="slipArea">
                    <label>แนบสลิปโอนเงิน (ใบเดียวรวมทุกรายการ)</label>
                    <input type="file" id="slipFile" accept="image/*" onchange="previewImg()">
                    <img id="preview">
                </div>
            </div>

            <div class="loader" id="loader">🚀 กำลังบันทึกข้อมูล...</div>
            <button type="submit" class="btn-submit" id="submitBtn">บันทึกข้อมูลออเดอร์</button>
        </form>
    </div>

    <div id="docs-page" class="page">
        <div class="profile">
            <h2 style="color:var(--primary); margin-top:50px;">คลังข้อมูลออเดอร์</h2>
            <p style="color:#888;">คลิกปุ่มด้านล่างเพื่อเปิดดู Google Sheets</p>
        </div>
        <div class="card" style="text-align: center;">
            <i class="fas fa-file-excel" style="font-size: 50px; color: #217346; margin-bottom: 20px;"></i>
            <button class="btn-submit" style="background:#217346;" onclick="window.open('https://docs.google.com/spreadsheets/d/1ZEHODUhJauzTkyqHCbKdx_koYBHIpRZWSMa8sl9mO4/edit', '_blank')">
                เปิด Google Sheets
            </button>
        </div>
    </div>
</div>

<div class="nav-bar">
    <div class="nav-item active" onclick="switchPage('home-page', this)">
        <i class="fas fa-plus-circle"></i><br>เพิ่มออเดอร์
    </div>
    <div class="nav-item" onclick="switchPage('docs-page', this)">
        <i class="fas fa-folder-open"></i><br>ดูเอกสาร
    </div>
</div>

<script>
    // URL Web App จาก Google Apps Script (ตรวจสอบให้เป็นอันล่าสุดเสมอ)
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzL5HNhVCzogiMnfLMx0gbb067OdHcvFbH97BjgMSMVVnnlMrS3rdUF-rWbpWygt7xd/exec"; 

    document.getElementById('orderDate').valueAsDate = new Date();

    function switchPage(pageId, navEl) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        navEl.classList.add('active');
    }

    function addFont() {
        const container = document.getElementById('fontList');
        const div = document.createElement('div');
        div.className = 'font-item';
        div.innerHTML = `
            <button type="button" class="btn-remove" onclick="this.parentElement.remove()">×</button>
            <label>เครือฟอนต์</label>
            <select class="net" onchange="checkNet(this)">
                <option value="BR_PRH">BR & PRH</option>
                <option value="P_Jang">พี่จ่าง</option>
                <option value="TCS">TCS</option>
                <option value="KT">KT</option>
                <option value="TAU">TAU</option>
                <option value="TP">TP</option>
                <option value="Novel_EB">Novel/EB</option>
            </select>
            <label>ชื่อฟอนต์</label>
            <input type="text" class="fname" placeholder="ระบุชื่อฟอนต์..." required>
            <div style="display:flex; gap:10px;">
                <div style="flex:1"><label>ราคาขาย</label><input type="number" class="fprice" required></div>
                <div style="flex:1; display:none;" class="rate-box"><label>เรท (ต้นทุน)</label><input type="number" class="frate" value="0"></div>
            </div>
            <label>ชนิดการใช้งาน</label>
            <select class="fusage">
                <option>ส่วนตัว</option><option>เชิงพาณิชย์</option><option>บริษัท</option>
            </select>
            <div class="checkbox-group">
                <label class="checkbox-item"><input type="checkbox" class="fship"> จัดส่งแล้ว</label>
                <label class="checkbox-item"><input type="checkbox" class="fcert"> ใบรับรอง</label>
            </div>
        `;
        container.appendChild(div);
    }

    function checkNet(s) {
        s.parentElement.querySelector('.rate-box').style.display = (s.value === 'BR_PRH') ? 'none' : 'block';
    }

    function toggleSlip() {
        document.getElementById('slipArea').style.display = (document.getElementById('channel').value === 'line') ? 'none' : 'block';
    }

    function previewImg() {
        const file = document.getElementById('slipFile').files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => { 
                const p = document.getElementById('preview');
                p.src = e.target.result; p.style.display = 'block'; 
            };
            reader.readAsDataURL(file);
        }
    }

    document.getElementById('orderForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const loader = document.getElementById('loader');
        btn.disabled = true; loader.style.display = 'block';

        const items = Array.from(document.querySelectorAll('.font-item')).map(el => ({
            network: el.querySelector('.net').value,
            fontName: el.querySelector('.fname').value,
            price: el.querySelector('.fprice').value,
            rate: el.querySelector('.frate').value,
            usageType: el.querySelector('.fusage').value,
            shipStatus: el.querySelector('.fship').checked ? "จัดส่งแล้ว" : "-",
            certStatus: el.querySelector('.fcert').checked ? "มีใบรับรอง" : "-"
        }));

        const payload = {
            orderDate: document.getElementById('orderDate').value,
            orderTime: document.getElementById('orderTime').value,
            email: document.getElementById('email').value,
            channel: document.getElementById('channel').value,
            fontItems: items
        };

        const fileInput = document.getElementById('slipFile');
        if (fileInput.files[0] && payload.channel !== 'line') {
            const reader = new FileReader();
            payload.image = await new Promise(r => { 
                reader.onload = (ev) => r(ev.target.result); 
                reader.readAsDataURL(fileInput.files[0]); 
            });
        }

        try {
            await fetch(WEB_APP_URL, { method: "POST", mode: 'no-cors', body: JSON.stringify(payload) });
            alert("✨ บันทึกข้อมูลสำเร็จ!");
            location.reload();
        } catch (err) {
            alert("บันทึกสำเร็จ (โปรดตรวจสอบที่ Google Sheets)");
            location.reload();
        }
    };

    addFont(); // สร้างฟอนต์รายการแรกอัตโนมัติ
</script>
</body>
</html>
