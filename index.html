<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thitiprastudio - Order System</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #ff85a2; --bg: #fdf2f4; --text: #444; }
        body { font-family: 'Kanit', sans-serif; background: var(--bg); margin: 0; padding-bottom: 90px; color: var(--text); }
        .container { max-width: 480px; margin: auto; padding: 20px; }
        .page { display: none; }
        .page.active { display: block; }
        .profile { text-align: center; margin-bottom: 20px; }
        .profile img { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--primary); object-fit: cover; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .font-item { background: #fff9fa; padding: 15px; border-radius: 15px; border: 1px solid #ffe4e9; margin-bottom: 15px; position: relative; }
        label { display: block; font-size: 12px; font-weight: bold; color: #888; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1.5px solid #eee; border-radius: 12px; box-sizing: border-box; font-size: 14px; outline: none; }
        
        /* สรุปออเดอร์ล่าสุดและยอดรายเดือน */
        .recent-box { background: #fff0f3; border-radius: 15px; padding: 15px; margin-bottom: 10px; border: 1px dashed var(--primary); text-align: left; }
        .monthly-box { background: var(--primary); color: white; border-radius: 15px; padding: 15px; margin-bottom: 20px; text-align: center; }
        .recent-title { color: var(--primary); font-weight: bold; font-size: 14px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .recent-info { font-size: 13px; line-height: 1.6; }

        .checkbox-group { display: flex; gap: 20px; margin-top: 10px; }
        .checkbox-item { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px; }
        .checkbox-item input { width: 18px; height: 18px; margin: 0; cursor: pointer; }
        .btn-add { background: white; color: var(--primary); border: 2px dashed var(--primary); padding: 12px; width: 100%; border-radius: 12px; cursor: pointer; font-weight: bold; margin-bottom: 20px; }
        .btn-submit { background: var(--primary); color: white; border: none; padding: 16px; width: 100%; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .btn-remove { position: absolute; top: 10px; right: 10px; color: #ff4d4d; border: none; background: none; font-size: 20px; cursor: pointer; }
        .nav-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #eee; }
        .nav-item { text-align: center; color: #aaa; cursor: pointer; font-size: 12px; flex: 1; }
        .nav-item.active { color: var(--primary); }
        #preview { width: 100%; border-radius: 12px; margin-top: 10px; display: none; }
        .loader { display: none; text-align: center; color: var(--primary); font-weight: bold; padding: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="home-page" class="page active">
        <div class="profile"><img src="IMG_5808.jpeg" alt="Logo"><h2 style="color:var(--primary); margin:10px;">Thitiprastudio</h2></div>
        <form id="orderForm">
            <div class="card">
                <div style="display:flex; gap:10px;">
                    <div style="flex:1"><label>วันที่แจ้งโอน</label><input type="date" id="orderDate" required></div>
                    <div style="flex:1"><label>เวลา</label><input type="time" id="orderTime" required></div>
                </div>
                <input type="email" id="email" placeholder="อีเมลลูกค้า" required>
            </div>
            <div id="fontList"></div>
            <button type="button" class="btn-add" onclick="addFont()">+ เพิ่มรายการฟอนต์</button>
            <div class="card">
                <label>ช่องทางการสั่งซื้อ</label>
                <select id="channel" onchange="toggleSlip()">
                    <option value="direct">สั่งผ่านแอดมิน (แนบสลิป)</option>
                    <option value="line">Line MyShop</option>
                </select>
                <div id="slipArea">
                    <input type="file" id="slipFile" accept="image/*" onchange="previewImg()">
                    <img id="preview">
                </div>
            </div>
            <div class="loader" id="loader">🚀 กำลังบันทึกข้อมูล...</div>
            <button type="submit" class="btn-submit" id="submitBtn">บันทึกข้อมูลออเดอร์</button>
        </form>
    </div>

    <div id="docs-page" class="page">
        <div class="profile" style="margin-top:30px;"><h2 style="color:var(--primary);">คลังข้อมูลออเดอร์</h2></div>
        
        <div class="card">
            <div class="monthly-box">
                <div style="font-size: 14px; opacity: 0.9;">สรุปยอดเดือนปัจจุบัน</div>
                <div id="monthlyTotal" style="font-size: 28px; font-weight: bold;">0 บาท</div>
            </div>

            <div id="recentOrder" class="recent-box">
                <div class="recent-title"><i class="fas fa-history"></i> ออเดอร์ล่าสุดที่บันทึก</div>
                <div id="recentContent" class="recent-info">ยังไม่มีข้อมูลออเดอร์ล่าสุดในรอบนี้</div>
            </div>

            <p style="font-size:12px; color:#888; margin-top:20px;">เปิด Google Sheets เพื่อดูข้อมูลทั้งหมด</p>
            <button class="btn-submit" style="background:#217346; margin-top:10px;" onclick="window.open('https://docs.google.com/spreadsheets/d/1ZEHODUhJAuzTkyqHCbKdx_koYBHIpRrZWSMa8sI9mO4/edit?usp=sharing', '_blank')">
                <i class="fas fa-file-excel"></i> เปิด Google Sheets
            </button>
        </div>
    </div>
</div>

<div class="nav-bar">
    <div class="nav-item active" onclick="switchPage('home-page', this)"><i class="fas fa-plus-circle"></i><br>เพิ่มออเดอร์</div>
    <div class="nav-item" onclick="switchPage('docs-page', this)"><i class="fas fa-folder-open"></i><br>ดูเอกสาร</div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw8GUNuM2cWeF1D9ZriJKOgq8lO01QSc6IodKAfPqz8p6UihU7wxH3xl04n9XSEdVxksw/exec"; 

    document.getElementById('orderDate').valueAsDate = new Date();
    updateDisplays();

    function switchPage(pId, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(pId).classList.add('active');
        el.classList.add('active');
        if(pId === 'docs-page') updateDisplays();
    }

    function addFont() {
        const div = document.createElement('div');
        div.className = 'font-item';
        div.innerHTML = `
            <button type="button" class="btn-remove" onclick="this.parentElement.remove()">×</button>
            <label>เครือฟอนต์</label>
            <select class="net" onchange="checkNet(this)">
                <option value="BR_PRH">BR & PRH</option><option value="P_Jang">พี่จ่าง</option>
                <option value="TCS">TCS</option><option value="KT">KT</option>
                <option value="TAU">TAU</option><option value="TP">TP</option><option value="Novel_EB">Novel/EB</option>
                <option value="PKF">PKF</option>
            </select>
            <input type="text" class="fname" placeholder="ชื่อฟอนต์" required>
            <div style="display:flex; gap:10px;">
                <div style="flex:1"><label>ราคา</label><input type="number" class="fprice" required></div>
                <div style="flex:1; display:none;" class="rate-box"><label>เรท</label><input type="number" class="frate" value="0"></div>
            </div>
            <select class="fusage"><option>ส่วนตัว</option><option>เชิงพาณิชย์</option><option>บริษัท</option></select>
            <div class="checkbox-group">
                <label class="checkbox-item"><input type="checkbox" class="fship"> จัดส่งแล้ว</label>
                <label class="checkbox-item"><input type="checkbox" class="fcert"> ใบรับรอง</label>
            </div>
        `;
        document.getElementById('fontList').appendChild(div);
    }

    function checkNet(s) { s.parentElement.querySelector('.rate-box').style.display = (s.value === 'BR_PRH') ? 'none' : 'block'; }
    function toggleSlip() { document.getElementById('slipArea').style.display = (document.getElementById('channel').value === 'line') ? 'none' : 'block'; }
    function previewImg() {
        const file = document.getElementById('slipFile').files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => { const p = document.getElementById('preview'); p.src = e.target.result; p.style.display = 'block'; };
            reader.readAsDataURL(file);
        }
    }

    document.getElementById('orderForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const loader = document.getElementById('loader');
        
        const fontItems = Array.from(document.querySelectorAll('.font-item')).map(el => ({
            network: el.querySelector('.net').value,
            fontName: el.querySelector('.fname').value,
            price: el.querySelector('.fprice').value,
            rate: el.querySelector('.frate').value,
            usageType: el.querySelector('.fusage').value,
            shipStatus: el.querySelector('.fship').checked ? "จัดส่งแล้ว" : "-",
            certStatus: el.querySelector('.fcert').checked ? "มีใบรับรอง" : "-"
        }));

        if(fontItems.length === 0) { alert("กรุณาเพิ่มรายการฟอนต์!"); return; }

        btn.disabled = true; loader.style.display = 'block';

        const payload = {
            orderDate: document.getElementById('orderDate').value,
            orderTime: document.getElementById('orderTime').value,
            email: document.getElementById('email').value,
            channel: document.getElementById('channel').value,
            fontItems: fontItems
        };

        const totalPrice = fontItems.reduce((sum, item) => sum + (parseFloat(item.price) || 0), 0);

        // --- ระบบบันทึกรายเดือน ---
        const dateObj = new Date(payload.orderDate);
        const monthYear = `${dateObj.getMonth() + 1}-${dateObj.getFullYear()}`;
        let monthlyData = JSON.parse(localStorage.getItem('monthlyTotals')) || {};
        monthlyData[monthYear] = (monthlyData[monthYear] || 0) + totalPrice;
        localStorage.setItem('monthlyTotals', JSON.stringify(monthlyData));
        // -----------------------

        localStorage.setItem('lastOrder', JSON.stringify({
            date: payload.orderDate,
            total: totalPrice,
            count: fontItems.length,
            fonts: fontItems.map(i => i.fontName).join(', ')
        }));

        const fileInput = document.getElementById('slipFile');
        if (fileInput.files[0] && payload.channel !== 'line') {
            const reader = new FileReader();
            payload.image = await new Promise(r => { reader.onload = (ev) => r(ev.target.result); reader.readAsDataURL(fileInput.files[0]); });
        }

        try {
            await fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify(payload) });
            alert("✨ บันทึกสำเร็จ!");
            location.reload();
        } catch (err) {
            alert("บันทึกสำเร็จ (โปรดตรวจสอบที่ Google Sheets)");
            location.reload();
        }
    };

    function updateDisplays() {
        // อัปเดตออเดอร์ล่าสุด
        const lastOrder = JSON.parse(localStorage.getItem('lastOrder'));
        const recentContent = document.getElementById('recentContent');
        if (lastOrder && recentContent) {
            recentContent.innerHTML = `
                📅 <b>วันที่แจ้งโอน:</b> ${lastOrder.date}<br>
                💰 <b>ยอดเงินรวม:</b> <span style="color:green; font-weight:bold;">${lastOrder.total} บาท</span><br>
                📦 <b>จำนวน:</b> ${lastOrder.count} รายการ<br>
                🔠 <b>ฟอนต์:</b> ${lastOrder.fonts}
            `;
        }

        // อัปเดตยอดรวมรายเดือน
        const now = new Date();
        const monthYear = `${now.getMonth() + 1}-${now.getFullYear()}`;
        const monthlyData = JSON.parse(localStorage.getItem('monthlyTotals')) || {};
        const currentMonthTotal = monthlyData[monthYear] || 0;
        document.getElementById('monthlyTotal').innerText = `${currentMonthTotal.toLocaleString()} บาท`;
    }

    addFont();
</script>
</body>
</html>
