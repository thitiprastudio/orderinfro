<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thitiprastudio - Order System</title>
    <style>
        /* กำหนดค่าสีหลักและ Font */
        :root { --primary: #ff85a2; --bg: #fdf2f4; --text: #333; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--text); }
        
        /* สไตล์กล่องข้อความหลัก */
        .container { max-width: 450px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(255,133,162,0.2); }
        
        /* สไตล์ส่วนโปรไฟล์ */
        .profile { text-align: center; margin-bottom: 25px; }
        .profile img { 
            width: 100px; /* ปรับขนาดรูปโปรไฟล์ */
            height: 100px; 
            border-radius: 50%; /* ทำรูปทรงกลม */
            border: 4px solid var(--primary); /* ใส่เส้นขอบสีชมพู */
            object-fit: cover; /* จัดการรูปภาพให้พอดี */
        }
        h2 { text-align: center; color: var(--primary); margin: 10px 0; font-size: 24px; }
        
        /* สไตล์ฟอร์ม */
        label { display: block; margin-top: 18px; font-weight: bold; font-size: 14px; color: #555; }
        input, select { width: 100%; padding: 12px; margin-top: 6px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; outline: none; transition: 0.2s; }
        input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(255,133,162,0.1); }
        
        /* สไตล์จัดหน้าแบบ 2 คอลัมน์ (ราคา/เรท) */
        .row { display: flex; gap: 15px; }
        .row .col { flex: 1; }
        
        /* สไตล์ปุ่มบันทึก */
        .btn-submit { background: var(--primary); color: white; border: none; padding: 16px; width: 100%; border-radius: 12px; font-size: 17px; font-weight: bold; cursor: pointer; margin-top: 30px; transition: 0.3s; box-shadow: 0 4px 10px rgba(255,133,162,0.3); }
        .btn-submit:hover { background: #ff6b8d; transform: translateY(-2px); box-shadow: 0 6px 15px rgba(255,133,162,0.4); }
        .btn-submit:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; }

        /* สไตล์ส่วนพรีวิวรูปสลิป */
        #slipArea { margin-top: 10px; }
        #preview { width: 100%; margin-top: 10px; border-radius: 10px; display: none; border: 2px dashed var(--primary); padding: 5px; box-sizing: border-box; }
        
        /* สไตล์ข้อความกำลังโหลด */
        .loading-text { text-align: center; color: var(--primary); display: none; font-weight: bold; margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <div class="profile">
        <img src="IMG_5808.jpeg" alt="Thitiprastudio Profile">
        <h2>Thitiprastudio</h2>
    </div>

    <form id="orderForm">
        <label>เครือฟอนต์</label>
        <select name="network" id="network" onchange="toggleFields()">
            <option value="BR_PRH">BR & PRH</option>
            <option value="P_Jang">พี่จ่าง</option>
            <option value="TCS">TCS</option>
            <option value="KT">KT</option>
            <option value="TAU">TAU</option>
            <option value="TP">TP</option>
            <option value="Novel_EB">Novel/EB</option>
        </select>

        <label>ชื่อฟอนต์</label>
        <input type="text" name="fontName" placeholder="ระบุชื่อฟอนต์..." required>

        <label>อีเมลลูกค้า</label>
        <input type="email" name="email" placeholder="example@gmail.com" required>

        <label>ชนิดการใช้งาน (Type of)</label>
        <select name="usageType">
            <option>ส่วนตัว</option>
            <option>เชิงพาณิชย์</option>
            <option>ส่วนตัว & เชิงพาณิชย์</option>
            <option>บริษัท</option>
        </select>

        <div class="row">
            <div class="col">
                <label>ราคาขาย (บาท)</label>
                <input type="number" name="price" id="price" placeholder="0" required>
            </div>
            <div class="col" id="rateGroup">
                <label>เรท (ต้นทุน)</label>
                <input type="number" name="rate" id="rate" value="0">
            </div>
        </div>

        <label>ช่องทางการสั่งซื้อ</label>
        <select name="channel" id="channel" onchange="toggleSlip()">
            <option value="direct">สั่งผ่านร้าน (แนบสลิป)</option>
            <option value="line">Line MyShop</option>
        </select>

        <div id="slipArea">
            <label>แนบสลิปโอนเงิน</label>
            <input type="file" id="slipFile" accept="image/*" onchange="previewImage()">
            <img id="preview" alt="สลิปพรีวิว">
        </div>

        <div class="loading-text" id="loader">⏳ กำลังส่งข้อมูลและอัปโหลดสลิป...</div>
        <button type="submit" class="btn-submit" id="submitBtn">บันทึกข้อมูลออเดอร์</button>
    </form>
</div>

<script>
    // *** สำคัญ: นำ URL ที่ได้จาก Google Apps Script มาวางตรงนี้ ***
    const WEB_APP_URL = "ใส่_WEB_APP_URL_ของคุณที่นี่"; 

    // ฟังก์ชันซ่อน/แสดงช่อง "เรท" ตามเครือที่เลือก
    function toggleFields() {
        const network = document.getElementById('network').value;
        const rateGroup = document.getElementById('rateGroup');
        rateGroup.style.display = (network === "BR_PRH") ? "none" : "block";
    }

    // ฟังก์ชันซ่อน/แสดงส่วนแนบสลิปตามช่องทางสั่งซื้อ
    function toggleSlip() {
        const channel = document.getElementById('channel').value;
        const slipArea = document.getElementById('slipArea');
        slipArea.style.display = (channel === "line") ? "none" : "block";
    }

    // ฟังก์ชันแสดงรูปพรีวิวเมื่อเลือกไฟล์
    function previewImage() {
        const file = document.getElementById('slipFile').files[0];
        const preview = document.getElementById('preview');
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => { 
                preview.src = e.target.result; 
                preview.style.display = 'block'; 
            };
            reader.readAsDataURL(file);
        }
    }

    // จัดการเมื่อกดปุ่มส่งฟอร์ม
    document.getElementById('orderForm').onsubmit = async (e) => {
        e.preventDefault(); // ป้องกันหน้าเว็บโหลดใหม่
        const btn = document.getElementById('submitBtn');
        const loader = document.getElementById('loader');
        
        btn.disabled = true; // ปิดใช้งานปุ่มชั่วคราว
        loader.style.display = 'block'; // แสดงข้อความกำลังโหลด

        // รวบรวมข้อมูลจากฟอร์ม
        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData.entries());
        
        // แปลงไฟล์ภาพสลิปเป็น Base64 (ถ้ามี)
        const fileInput = document.getElementById('slipFile');
        if (fileInput.files[0] && data.channel !== "line") {
            const reader = new FileReader();
            data.image = await new Promise(resolve => {
                reader.onload = (e) => resolve(e.target.result);
                reader.readAsDataURL(fileInput.files[0]);
            });
        }

        try {
            // ส่งข้อมูลไปยัง Google Web App
            const response = await fetch(WEB_APP_URL, {
                method: "POST",
                mode: 'no-cors', // สำคัญ: ป้องกันปัญหา CORS
                body: JSON.stringify(data)
            });
            
            // เนื่องจากใช้ no-cors จะเช็ค response.ok ไม่ได้ ให้สมมติว่าสำเร็จถ้าไม่มี error
            alert("บันทึกสำเร็จ! ข้อมูลถูกส่งไปที่ Google Sheet เรียบร้อยแล้วค่ะ");
            e.target.reset(); // ล้างข้อมูลในฟอร์ม
            document.getElementById('preview').style.display = 'none'; // ซ่อนรูปพรีวิว
        } catch (error) {
            console.error('Error:', error);
            // แจ้งเตือนผู้ใช้ในกรณีที่เกิดข้อผิดพลาดจริงๆ
            alert("เกิดข้อผิดพลาดในการเชื่อมต่อ แต่ข้อมูลอาจจะถูกบันทึกแล้ว โปรดตรวจสอบที่ Google Sheet");
        } finally {
            // เปิดใช้งานปุ่มอีกครั้งและซ่อนข้อความกำลังโหลด
            btn.disabled = false;
            loader.style.display = 'none';
        }
    };

    // เรียกใช้งานฟังก์ชันเริ่มต้นเมื่อโหลดหน้าเว็บ
    toggleFields();
    toggleSlip();
</script>

</body>
</html>
